# Cloud Build pipeline for the Optimisation sidecar.
#
# Trigger setup (one-time, via console or `gcloud builds triggers create github`):
#   - Repo: this GitHub repo
#   - Branch: ^main$
#   - Included files filter: services/optimizer/**
#   - Cloud Build configuration: cloudbuild.yaml
#
# Substitutions provided automatically:
#   $PROJECT_ID = nahidarbx-6e73
#   $SHORT_SHA  = git short sha for tagging

substitutions:
  _REGION: asia-south1
  _JOB_NAME: nahidarbx-optimizer-job
  _OLD_SERVICE_NAME: nahidarbx-optimizer
  _IMAGE_NAME: nahidarbx-optimizer
  _REPOSITORY: optimizer
  _SERVICE_ACCOUNT: optimizer-sa@nahidarbx-6e73.iam.gserviceaccount.com
  _CLOUD_SQL_INSTANCE: nahidarbx-6e73:asia-south1:nahidarbx-db

steps:
  # 1. Build the image.
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: services/optimizer
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest
      - .

  # 2. Push to Artifact Registry.
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest

  # 3. Deploy as a Cloud Run Job (one execution per sweep).
  #
  #    Why Jobs and not Service: a Service runs an HTTP receiver and the
  #    autoscaler reaps idle instances even with --no-cpu-throttling
  #    (observed 2026-04-25 on run 00MODMUK35STEVK2ZB430FQDJO — instance
  #    killed ~15 min after /run/start returned 202, leaving an orphaned
  #    asyncio loop that died with the instance). Jobs are designed for
  #    run-to-completion batch and don't have this surface — each
  #    execution runs `python -m app.job` to completion, then exits.
  #
  #    Resource flags:
  #    - --cpu=6 / --memory=12Gi matches the prior Service config (capped
  #      by asia-south1 quota — see the regional quota note in the
  #      previous Service deploy that's now removed).
  #    - --task-timeout=21600 (6h) — generous against worst-case sweeps,
  #      well below the 7-day Cloud Run Jobs ceiling.
  #    - --max-retries=0 — let the Next.js scheduler control retry
  #      semantics. Cloud Run's auto-retry on a real bug would just
  #      double-bill without fixing anything.
  #    - --parallelism=1 --tasks=1 — one container per execution; the
  #      runner uses asyncio internally for trial-level concurrency.
  #
  #    Env / secrets:
  #    - DATABASE_URL via Secret Manager.
  #    - CLOUD_SQL_INSTANCE via env, attached for connector access.
  #    - GCP_PROJECT_ID / GCP_REGION for Vertex AI model registration.
  #    - OPTIMIZER_PARALLEL=1 turns on the Semaphore/gather loop.
  #    - OPTIMIZER_MAX_CONCURRENCY=6 matches the 6 vCPU ceiling.
  #    - OPTIMIZER_SHARED_SECRET is gone — Jobs have no HTTP surface.
  #
  #    IAM: the Next.js host's runtime SA (locally, the operator's
  #    `gcloud auth application-default login` identity) needs
  #    roles/run.invoker on this Job to trigger executions. Grant with:
  #      gcloud run jobs add-iam-policy-binding nahidarbx-optimizer-job \
  #        --region=asia-south1 --member=user:<email> --role=roles/run.invoker
  - id: deploy-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - jobs
      - deploy
      - ${_JOB_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --service-account=${_SERVICE_ACCOUNT}
      - --cpu=6
      - --memory=12Gi
      - --task-timeout=21600
      - --max-retries=0
      - --parallelism=1
      - --tasks=1
      - --set-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=CLOUD_SQL_INSTANCE=${_CLOUD_SQL_INSTANCE},GCP_PROJECT_ID=${PROJECT_ID},GOOGLE_CLOUD_PROJECT=${PROJECT_ID},GCP_REGION=${_REGION},LOG_LEVEL=INFO,OPTIMIZER_PARALLEL=1,OPTIMIZER_MAX_CONCURRENCY=6,VERTEX_MODEL_BUCKET=gs://nahidarbx-ml-models,ML_MODEL_BUCKET=nahidarbx-ml-models,VERTEX_SERVING_IMAGE=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest

  # 4. Delete the legacy Cloud Run Service. Idempotent: --quiet on a
  #    missing service exits non-zero, so we tolerate the failure with
  #    ||  true. After a few stable Job runs this step can be deleted.
  - id: delete-old-service
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run services delete ${_OLD_SERVICE_NAME} \
          --region=${_REGION} --quiet 2>/dev/null \
          && echo "✓ Legacy Service ${_OLD_SERVICE_NAME} deleted" \
          || echo "ℹ Legacy Service ${_OLD_SERVICE_NAME} already gone (or never existed)"

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_IMAGE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
