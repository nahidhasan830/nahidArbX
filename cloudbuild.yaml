# Cloud Build pipeline for the AlphaSearch optimizer sidecar.
#
# Trigger setup (one-time, via console or `gcloud builds triggers create github`):
#   - Repo: this GitHub repo
#   - Branch: ^main$
#   - Included files filter: services/optimizer/**
#   - Cloud Build configuration: cloudbuild.yaml
#
# Substitutions provided automatically:
#   $PROJECT_ID = nahidarbx-6e73
#   $SHORT_SHA  = git short sha for tagging

substitutions:
  _REGION: asia-south1
  _SERVICE_NAME: nahidarbx-optimizer
  _REPOSITORY: optimizer
  _SERVICE_ACCOUNT: optimizer-sa@nahidarbx-6e73.iam.gserviceaccount.com
  _CLOUD_SQL_INSTANCE: nahidarbx-6e73:asia-south1:nahidarbx-db

steps:
  # 1. Build the image.
  - id: build
    name: gcr.io/cloud-builders/docker
    dir: services/optimizer
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest
      - .

  # 2. Push to Artifact Registry.
  - id: push-sha
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
  - id: push-latest
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest

  # 3. Deploy to Cloud Run.
  #    - min instances=0 (scale-to-zero, costs nothing when idle)
  #    - max instances=3 (one heavy run per instance is plenty)
  #    - 4 CPU / 8 GiB (Polars + Optuna in-memory work on 100k+ bets)
  #    - DATABASE_URL is read from Secret Manager
  #    - OPTIMIZER_SHARED_SECRET is read from Secret Manager
  #    - Cloud SQL instance attached for connector access
  #    - --ingress=internal so only the Next.js service can reach it
  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE_NAME}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
      - --region=${_REGION}
      - --service-account=${_SERVICE_ACCOUNT}
      - --min-instances=0
      - --max-instances=3
      - --cpu=4
      - --memory=8Gi
      - --concurrency=1
      - --timeout=3600
      # CPU must stay allocated even when no request is in flight —
      # otherwise Cloud Run throttles the instance to ~5% CPU the
      # moment /run/start returns 202 (fire-and-forget), killing the
      # background trial loop mid-sweep (observed 2026-04-24 on run
      # 00MOD1KTMS2L6ZMI1I0O5GG3IX, stuck at 22/50 after idle scale-down).
      - --no-cpu-throttling
      # Public ingress so the Next.js app (running locally on the operator's
      # machine) can reach the sidecar. Auth is provided by the HMAC token
      # in OPTIMIZER_SHARED_SECRET — verified inside main.py with constant-
      # time compare. Lock down to --ingress=internal once Next.js also
      # runs in the same VPC.
      - --ingress=all
      - --allow-unauthenticated
      - --add-cloudsql-instances=${_CLOUD_SQL_INSTANCE}
      - --set-env-vars=CLOUD_SQL_INSTANCE=${_CLOUD_SQL_INSTANCE},LOG_LEVEL=INFO
      - --set-secrets=DATABASE_URL=DATABASE_URL:latest,OPTIMIZER_SHARED_SECRET=OPTIMIZER_SHARED_SECRET:latest

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:${SHORT_SHA}
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPOSITORY}/${_SERVICE_NAME}:latest

options:
  logging: CLOUD_LOGGING_ONLY
